version: 2

before:
  hooks:
    - go mod tidy
    - make setup-ghostty-vt

builds:
  - id: tsm
    binary: tsm
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - ids:
      - tsm
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - src: .ghostty-prefix/lib/libghostty-vt*.dylib
        dst: .
      - src: .ghostty-prefix/lib/libghostty-vt*.so*
        dst: .

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
