[tools]
go = "1.25"

[tasks.build]
description = "Build tsm binary"
run = "make build"

[tasks.install]
description = "Install tsm with bundled libghostty-vt"
run = "make install"

[tasks.fmt]
description = "Format code"
run = "gofmt -w ."

[tasks.lint]
description = "Run linter"
run = "go vet ./..."

[tasks.test]
description = "Run tests"
run = "make test"

[tasks.clean]
description = "Remove built binary"
run = "rm -f tsm"
