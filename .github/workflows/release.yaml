name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-amd64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
          - runner: macos-15-intel
            target: darwin-amd64
          - runner: macos-14
            target: darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          case "$(uname -s)" in
            Linux) os=linux ;;
            Darwin) os=macos ;;
            *) echo "unsupported OS: $(uname -s)" >&2; exit 1 ;;
          esac
          case "$(uname -m)" in
            x86_64) arch=x86_64 ;;
            arm64|aarch64) arch=aarch64 ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          version=0.15.2
          archive="zig-${arch}-${os}-${version}.tar.xz"
          url="https://ziglang.org/download/${version}/${archive}"
          curl -L "$url" -o "$archive"
          tar -xf "$archive"
          echo "$PWD/zig-${arch}-${os}-${version}" >> "$GITHUB_PATH"
      - run: make setup-ghostty-vt
      - run: make release VERSION=${GITHUB_REF_NAME} COMMIT=${GITHUB_SHA}
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt

  publish-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ vars.HOMEBREW_TAP_REPO != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - name: Compute release archive URLs and checksums
        env:
          RELEASE_BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          darwin_amd64="tsm_${GITHUB_REF_NAME}_darwin_amd64.tar.gz"
          darwin_arm64="tsm_${GITHUB_REF_NAME}_darwin_arm64.tar.gz"
          linux_amd64="tsm_${GITHUB_REF_NAME}_linux_amd64.tar.gz"
          linux_arm64="tsm_${GITHUB_REF_NAME}_linux_arm64.tar.gz"
          echo "DARWIN_AMD64_URL=${RELEASE_BASE}/${darwin_amd64}" >> "$GITHUB_ENV"
          echo "DARWIN_ARM64_URL=${RELEASE_BASE}/${darwin_arm64}" >> "$GITHUB_ENV"
          echo "LINUX_AMD64_URL=${RELEASE_BASE}/${linux_amd64}" >> "$GITHUB_ENV"
          echo "LINUX_ARM64_URL=${RELEASE_BASE}/${linux_arm64}" >> "$GITHUB_ENV"
          echo "DARWIN_AMD64_SHA256=$(awk '/_darwin_amd64.tar.gz$/ {print \$1}' checksums.txt)" >> "$GITHUB_ENV"
          echo "DARWIN_ARM64_SHA256=$(awk '/_darwin_arm64.tar.gz$/ {print \$1}' checksums.txt)" >> "$GITHUB_ENV"
          echo "LINUX_AMD64_SHA256=$(awk '/_linux_amd64.tar.gz$/ {print \$1}' checksums.txt)" >> "$GITHUB_ENV"
          echo "LINUX_ARM64_SHA256=$(awk '/_linux_arm64.tar.gz$/ {print \$1}' checksums.txt)" >> "$GITHUB_ENV"
      - name: Clone tap repository
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          test -n "$HOMEBREW_TAP_GITHUB_TOKEN"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/${{ vars.HOMEBREW_TAP_REPO }}.git" homebrew-tap
      - name: Generate formula
        run: |
          mkdir -p homebrew-tap/Formula
          VERSION="${GITHUB_REF_NAME}" \
          REPOSITORY="${GITHUB_REPOSITORY}" \
          DARWIN_AMD64_URL="${DARWIN_AMD64_URL}" \
          DARWIN_AMD64_SHA256="${DARWIN_AMD64_SHA256}" \
          DARWIN_ARM64_URL="${DARWIN_ARM64_URL}" \
          DARWIN_ARM64_SHA256="${DARWIN_ARM64_SHA256}" \
          LINUX_AMD64_URL="${LINUX_AMD64_URL}" \
          LINUX_AMD64_SHA256="${LINUX_AMD64_SHA256}" \
          LINUX_ARM64_URL="${LINUX_ARM64_URL}" \
          LINUX_ARM64_SHA256="${LINUX_ARM64_SHA256}" \
          bash scripts/generate_homebrew_formula.sh > homebrew-tap/Formula/tsm.rb
          ruby -c homebrew-tap/Formula/tsm.rb
      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tsm.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "tsm ${GITHUB_REF_NAME}"
          git push
