name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - run: make setup-ghostty-vt
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: make test
      - run: make build
