name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: test -z "$(gofmt -l $(git ls-files '*.go'))"
      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          case "$(uname -s)" in
            Linux) os=linux ;;
            Darwin) os=macos ;;
            *) echo "unsupported OS: $(uname -s)" >&2; exit 1 ;;
          esac
          case "$(uname -m)" in
            x86_64) arch=x86_64 ;;
            arm64|aarch64) arch=aarch64 ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          version=0.15.2
          archive="zig-${arch}-${os}-${version}.tar.xz"
          url="https://ziglang.org/download/${version}/${archive}"
          curl -L "$url" -o "$archive"
          tar -xf "$archive"
          echo "$PWD/zig-${arch}-${os}-${version}" >> "$GITHUB_PATH"
      - run: make setup-ghostty-vt
      - run: make lint
      - run: make test
      - run: make build
