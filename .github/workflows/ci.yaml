name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: test -z "$(gofmt -l $(git ls-files '*.go'))"
      - name: Install Zig
        run: echo "$(bash scripts/install_zig.sh)" >> "$GITHUB_PATH"
      - run: make setup
      - run: make lint
      - run: make test
      - run: make build
